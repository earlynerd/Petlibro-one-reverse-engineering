; Petlibro RTL8721DM programming / RFID-snoop bridge
; Raspberry Pi Pico (RP2040) — arduino-pico (earlephilhower) core.

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower

; No LittleFS needed — give all 4 MB (well, 2 MB on a stock Pico) to code.
board_build.filesystem_size = 0m

; Adafruit TinyUSB stack is required for the second CDC port (control console
; + RFID snoop). The core's bundled tusb_config.h hard-pins CFG_TUD_CDC to 1,
; so we point every TinyUSB translation unit at our own config (CFG_TUD_CDC=2)
; in include/custom_tusb_config.h via CFG_TUSB_CONFIG_FILE.
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUSB_CONFIG_FILE=\"custom_tusb_config.h\"
    -Iinclude/

monitor_speed = 115200

; Flash the Pico the easy way: hold BOOTSEL, plug in, it mounts as RPI-RP2,
; and PlatformIO copies the UF2. (`pio run -t upload`)
upload_protocol = picotool
