; ===========================================================================
;  RTL8721DM Feeder — de-clouded replacement firmware for the Petlibro feeder
; ===========================================================================
;  Same toolchain/board as the proven hello-world: community AmebaD PlatformIO
;  platform (tmmsunny012 port of Realtek's ameba-arduino-d). The "SparkFun
;  AzureWave Thing Plus" board def IS the RTL8721DM — the feeder's exact SoC.
;
;  PREREQUISITE — the SDK fork is the framework package (edit paths if cloned
;  elsewhere). The Preferences library is a submodule of that clone; fetch it:
;    git -C C:/Users/mmsyl/ameba-arduino-d submodule update --init \
;      Arduino_package/hardware/libraries/Preferences
;
;  Also copy src/secrets.example.h -> src/secrets.h and fill in WiFi creds.
;  secrets.h is gitignored.
;
;  BUILD :  pio run
;  FLASH :  pio run -t upload --upload-port COM<bridge-CDC0>
;           ...then type `download` on CDC1 DURING the uploader's 5 s countdown.
;  WATCH :  pio device monitor -b 115200 -p COM<bridge-CDC0>
; ===========================================================================

[platformio]
default_envs = sparkfun_awcu488

[env]
platform = file://C:/Users/mmsyl/ameba-arduino-d/platformio/platform-amebad
framework = arduino
platform_packages =
    framework-arduinoamebad @ symlink://C:/Users/mmsyl/ameba-arduino-d

monitor_speed = 115200
upload_speed  = 115200

; let cross-module includes resolve from the src/ root: "app/registry.h" etc.
build_flags =
    -I src

[env:sparkfun_awcu488]
board = sparkfun_awcu488

; Diagnostic build: initialise ONLY the display (skip every other driver), to
; test whether another peripheral's init is what blanks the panel.
;   pio run -e display_only -t upload --upload-port COM<CDC0>
[env:display_only]
board = sparkfun_awcu488
build_flags = ${env.build_flags} -D DISPLAY_ONLY
