; ===========================================================================
;  RTL8721DM "hello world" — first custom firmware for the Petlibro feeder SoC
; ===========================================================================
;  Built with the community AmebaD PlatformIO platform (tmmsunny012's port of
;  Realtek's ameba-arduino-d SDK). The "SparkFun AzureWave Thing Plus" board
;  def IS the RTL8721DM — the exact SoC in the feeder (the AMB21/AMB23 boards
;  are the RTL8722DM, a different part).
;
;  PREREQUISITE — clone the SDK fork locally (it is the framework package):
;    git clone --depth 1 --branch feature-platformio-support \
;      https://github.com/tmmsunny012/ameba-arduino-d.git C:/Users/mmsyl/ameba-arduino-d
;  Put it elsewhere? Edit the two paths below (forward slashes, no trailing /).
;
;  BUILD :  pio run
;  FLASH :  pio run -t upload --upload-port COM<bridge-CDC0>
;           ...then type `download` on CDC1 DURING the uploader's 5 s countdown
;           (pre-arming does NOT work — the ROM's SYNC burst is missed). `run` after.
;  WATCH :  pio device monitor -b 115200 -p COM<bridge-CDC0>
;
;  See README.md for the full flash-through-the-Pico-bridge procedure and the
;  un-brick (restore stock dump) steps.
; ===========================================================================

[platformio]
default_envs = sparkfun_awcu488

[env]
; ---- AmebaD platform + framework, from the local clone -------------------
;      (machine-specific absolute paths — edit if you cloned elsewhere)
platform = file://C:/Users/mmsyl/ameba-arduino-d/platformio/platform-amebad
framework = arduino
platform_packages =
    framework-arduinoamebad @ symlink://C:/Users/mmsyl/ameba-arduino-d

monitor_speed = 115200
upload_speed  = 115200

; ---- Board: RTL8721DM (== the feeder's SoC) ------------------------------
[env:sparkfun_awcu488]
board = sparkfun_awcu488
