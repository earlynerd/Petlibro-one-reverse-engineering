; ===========================================================================
;  RTL8721DM Display Init Fuzzer — for the Petlibro feeder dot-matrix screen
; ===========================================================================
;  This firmware brute-forces the initialization command for the undocumented
;  display controller on the RTL8721DM. It uses a bit-banged 4-pin interface 
;  and steps through 8-bit commands, followed by writing 0xFF to RAM.
;
;  BUILD :  pio run
;  FLASH :  pio run -t upload --upload-port COM<bridge-CDC0>
;           ...then type `download` on CDC1 DURING the uploader's 5 s countdown.
;  USE   :  pio device monitor -b 115200 -p COM<bridge-CDC0>
; ===========================================================================

[platformio]
default_envs = sparkfun_awcu488

[env]
; machine-specific paths — edit if you cloned the SDK elsewhere
platform = file://C:/Users/mmsyl/ameba-arduino-d/platformio/platform-amebad
framework = arduino
platform_packages =
    framework-arduinoamebad @ symlink://C:/Users/mmsyl/ameba-arduino-d

monitor_speed = 115200
upload_speed  = 921600

[env:sparkfun_awcu488]
board = sparkfun_awcu488
