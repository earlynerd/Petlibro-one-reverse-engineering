; ===========================================================================
;  RTL8721DM GPIO explorer — board-mapping tool for the Petlibro feeder
; ===========================================================================
;  Same AmebaD toolchain as ../rtl8721dm-hello (see that README for the SDK
;  clone prerequisite and the flashing procedure). This firmware turns the
;  feeder's own RTL8721DM into an interactive pin prober so we can find which
;  GPIOs carry the RFID UART, the lid motor, buttons/sensors, the tag IRQ, etc.
;
;  BUILD :  pio run
;  FLASH :  pio run -t upload --upload-port COM<bridge-CDC0>
;           ...then type `download` on CDC1 DURING the uploader's 5 s countdown.
;  USE   :  pio device monitor -b 115200 -p COM<bridge-CDC0>   (type `help`)
; ===========================================================================

[platformio]
default_envs = sparkfun_awcu488

[env]
; machine-specific paths — edit if you cloned the SDK elsewhere
platform = file://C:/Users/mmsyl/ameba-arduino-d/platformio/platform-amebad
framework = arduino
platform_packages =
    framework-arduinoamebad @ symlink://C:/Users/mmsyl/ameba-arduino-d

monitor_speed = 115200
upload_speed  = 921600

[env:sparkfun_awcu488]
board = sparkfun_awcu488
